# =====================
# Model and device
# =====================
test_only: true

model_name_or_path: "Qwen/Qwen1.5-MoE-A2.7B"
load_in_4bit: false
load_in_8bit: false
trust_remote_code: true

test_speed: false
real_slim: true
shrink_gate: true

device: "cuda"
dtype: "bf16"          # Options: bf16 / fp16 / fp32
use_wandb: false

num_workers: 0
calib_batches: 20

# =====================
# Evaluation
# =====================
eval_sample_limit: -1
eval_split: "test"
per_device_eval_batch_size: 16


# Initialize pruning params (initial trim based on scores)
prune_kwargs:
  # Pruning ratio config
  prune_ratio: 0.5          # intermediate size target pruning ratio
  # Pruning method config
  mask_method_kwargs:
    intra_layer_method: "attr_coverage"
    intra_expert_metric: "activation"
    inter_layer_method: "loss_coverage"
    
  adjust_masks_kwargs:
    align_inter: 64               # align intermediate size to multiples of 64
    min_per_expert: 128     # min channels per expert

scores_dir: /path/to/scores/dir

# =====================
# resume & save
# =====================
resume_path: /path/to/resume/path
mask_dir: /path/to/masks.pth
resume_training: false

