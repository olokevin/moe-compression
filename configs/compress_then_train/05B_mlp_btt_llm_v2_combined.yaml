# 0.5B mixed-compression sweep — MLP=nystrom (ratio 0.8), attention (qkvo) uncompressed.
# Pipeline: C4-calibrated compression -> continue-train on C4 (CE, 1000 steps)
#           -> eval MMLU(5% subset) + C4/WikiText PPL + hellaswag, right after
#              compression (step 0) and every 200 steps.

model_name_or_path: Qwen/Qwen2.5-0.5B
lr: 1.0e-4
optimizer: adamw
lr_scheduler: cosine
warmup_ratio: 0.05
weight_decay: 0.01
batch_size: 2
gradient_accumulation_steps: 16
num_epochs: 1
seed: 42

# ── W&B ──────────────────────────────────────────────────────────────────────
no_wandb: false
wandb_project: yequan-train_aware-05B
wandb_run_name: 05B_mlp-btt_llm_v2_combined-0.8_attn-none_ce-c4

# ── Mixed per-module compression ─────────────────────────────────────────────
# Rules are ordered general -> specific; the last matching rule wins.
compression_rules:
  - pattern: 'model\.layers\.\d+\.mlp'          # gate/up/down of every layer's MLP
    method: btt_llm_v2_combined
    compression_ratio: 0.8
  - pattern: 'model\.layers\.\d+\.self_attn\.[qkvo]_proj'   # leave attention dense
    method: none
    compression_ratio: 1.0

calib_source: c4
calib_num_seqs: 128
calib_max_length: 2048
calib_batch_size: 2
calib_seed: 3
eval_ppl_after_compression: true
eval_ppl_seqlen: 2048
skip_layers: lm_head

# ── Continue-training ─────────────────────────────────────────────────────────
kd_loss_type: ce
ce_data_source: c4
ce_seq_len: 1024
ce_steps: 1000
save_steps: none
base_dir: outputs/compress_then_train

# ── Benchmarking ─────────────────────────────────────────────────────────────
run_lm_eval: true
eval_before_compression: true
eval_after_compression: true
eval_every_steps: 200
lm_eval_tasks: hellaswag,mmlu
lm_eval_limit: 0.05           # 5% subset per task (lm-eval treats <1 as a fraction)
lm_eval_batch_size: 8
lm_eval_max_seqlen: 2048
