# MoBE (Mixture-of-Basis-Experts) one-shot decomposition of Qwen3-30B-A3B.
#
# Data-free: factorizes every routed expert's gate_proj/up_proj into a per-layer
# shared basis (m=16) + per-expert transform at rank r=p=768. The paper fixes
# r=p and varies the shared-basis count m as the compression knob. With m=16,
# r=768 the up+gate params shrink to 50% (gamma_ug=0.5), so the total MoE-layer
# params drop by exactly 1/3 = 33.3% (down_proj left dense). No LoRA/CE recovery;
# just decompose -> post-compression PPL (wikitext2/c4) -> lm-eval hellaswag/mmlu.
#
# This is the 33% counterpart of qwen3_30b_a3b_mobe.yaml (25%, m=32). Only the
# basis count changed (32 -> 16); everything else matches the 25% run settings
# from docs/results/mobe/initial_results.md.
#
# Launch on A100-New with sharding env flags (see qwen3-30b-on-40gb-a100 memory):
#   FORCE_DEVICE_MAP_AUTO=1 PER_GPU_MEM=36GiB ATTN_IMPLEMENTATION=sdpa \
#   PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True

model_name_or_path: Qwen/Qwen3-30B-A3B
lr: 1.0e-4
optimizer: adamw
lr_scheduler: cosine
warmup_ratio: 0.05
weight_decay: 0.01
batch_size: 1
gradient_accumulation_steps: 1
num_epochs: 1
seed: 42

no_wandb: true

# ── MoBE decomposition (data-free) ────────────────────────────────────────────
train_mode: mobe
compression_ratio: 0.67          # bookkeeping (retain ~2/3); MoBE size set by (m, r) below
moe_basis_count: 16              # m — shared basis matrices per layer/type (32->16 for 33%)
moe_basis_rank: 768              # r ≈ hidden_size p (paper sets r=p) -> gamma_ug=0.5
moe_fit_iters: 2000              # Adam steps (epochs) per (layer,type); reference uses 30000
moe_fit_lr: 0.07
moe_fit_patience: 0              # 0 = fixed epochs, matching the reference trainer
moe_z_norm: true                 # reference std-only normalization (no mean subtraction)
moe_fit_log_every: 500
# Auto-save after compression: <run_dir>/compressed_model/{mobe_native, hf_reconstructed}.
# hf_reconstructed/ loads directly with AutoModelForCausalLM (lm-eval, vLLM).
moe_save_native: true
moe_save_hf_reconstructed: true

calib_source: c4                 # unused for mobe (data-free) but must be valid
eval_ppl_after_compression: true
eval_ppl_seqlen: 2048
skip_layers: lm_head

# ── One-shot: decompose + eval only, NO recovery training ─────────────────────
kd_loss_type: ce                 # required field; unused when one_shot_eval_only
ce_data_source: c4
ce_seq_len: 2048
ce_steps: 1                      # unused (one_shot_eval_only exits before training)
save_steps: none
base_dir: outputs/compress_then_train
one_shot_eval_only: true

# ── Benchmarking: hellaswag (0-shot) + mmlu (5-shot), PPL on wikitext2/c4 ─────
# Full tasks, one eval call per task (per-task few-shot), matching the standalone
# eval protocol in docs/results/attribution_guided/nystrom.md. PPL + HellaSwag run
# first (fast); full 5-shot MMLU last (slow). Baseline skips MMLU per request —
# baseline HellaSwag comes from the run, MMLU baseline is the known 82.0 (nystrom doc).
run_lm_eval: true
eval_before_compression: true
eval_after_compression: true     # the reported one-shot compressed numbers
baseline_skip_tasks: mmlu        # skip the expensive uncompressed MMLU baseline
eval_every_steps: 0
lm_eval_tasks: hellaswag,mmlu
lm_eval_limit: -1                # full tasks (HellaSwag 10042, MMLU 14042 x 57)
lm_eval_batch_size: 8
lm_eval_max_seqlen: 2048
