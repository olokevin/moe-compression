# MoBE (Mixture-of-Basis-Experts) one-shot decomposition of Qwen3-30B-A3B —
# 33% MoE-layer reduction spread EVENLY across gate_proj / up_proj / down_proj.
#
# Unlike the classic MoBE runs (qwen3_30b_a3b_mobe{,_33}.yaml) which leave
# down_proj DENSE and put all the compression on up+gate, this run factorizes
# ALL THREE expert matrices to the same per-matrix ratio:
#   * gate_proj / up_proj — shared per-layer basis on the INPUT (hidden d) side
#     (classic MoBE):  W_hat = A_i @ f(sum_j softmax(alpha)_j B_j),  B_j (r, d).
#   * down_proj          — shared per-layer basis on the OUTPUT (hidden d) side,
#     realized by fitting on down_projᵀ (moe_compress_down=true):
#         W_hat = ( A_i @ f(sum_j softmax(alpha)_j B_j) )ᵀ,  B_j (r, d).
#
# Per-matrix stored/orig for each of the three (all are 768x2048, r=p=768):
#     gamma = r/d + m*r/(n*p) = 0.375 + m/128
# m=38 -> gamma = 0.6719 -> each matrix (and the whole MoE layer) shrinks 32.8%,
# the closest integer-m to an even 33% across gate/up/down. (down_proj's
# output-side factorization has the identical param count by symmetry, so the
# split is exactly even.) No LoRA/CE recovery; decompose -> PPL -> lm-eval.
#
# Launch on A100-New with sharding env flags (see qwen3-30b-on-40gb-a100 memory):
#   FORCE_DEVICE_MAP_AUTO=1 PER_GPU_MEM=36GiB ATTN_IMPLEMENTATION=sdpa \
#   PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True

model_name_or_path: Qwen/Qwen3-30B-A3B
lr: 1.0e-4
optimizer: adamw
lr_scheduler: cosine
warmup_ratio: 0.05
weight_decay: 0.01
batch_size: 1
gradient_accumulation_steps: 1
num_epochs: 1
seed: 42

no_wandb: true

# ── MoBE decomposition (data-free), all three matrices ────────────────────────
train_mode: mobe
compression_ratio: 0.67          # bookkeeping (retain ~2/3); MoBE size set by (m, r) below
moe_basis_count: 38              # m — shared basis matrices per layer/type -> gamma=0.672
moe_basis_rank: 768              # r ≈ hidden_size p (paper sets r=p)
moe_compress_down: true          # ALSO factorize down_proj (output-side basis)
moe_fit_iters: 2000              # Adam steps (epochs) per (layer,type); reference uses 30000
moe_fit_lr: 0.07
moe_fit_patience: 0              # 0 = fixed epochs, matching the reference trainer
moe_z_norm: true                 # reference std-only normalization (no mean subtraction)
moe_fit_log_every: 500
# Auto-save after compression: <run_dir>/compressed_model/{mobe_native, hf_reconstructed}.
moe_save_native: true
moe_save_hf_reconstructed: true

calib_source: c4                 # unused for mobe (data-free) but must be valid
eval_ppl_after_compression: true
eval_ppl_seqlen: 2048
skip_layers: lm_head

# ── One-shot: decompose + eval only, NO recovery training ─────────────────────
kd_loss_type: ce                 # required field; unused when one_shot_eval_only
ce_data_source: c4
ce_seq_len: 2048
ce_steps: 1                      # unused (one_shot_eval_only exits before training)
save_steps: none
base_dir: outputs/compress_then_train
one_shot_eval_only: true

# ── Benchmarking: hellaswag (0-shot) + mmlu (5-shot), PPL on wikitext2/c4 ─────
run_lm_eval: true
eval_before_compression: true
eval_after_compression: true     # the reported one-shot compressed numbers
baseline_skip_tasks: mmlu        # skip the expensive uncompressed MMLU baseline
eval_every_steps: 0
lm_eval_tasks: hellaswag,mmlu
lm_eval_limit: -1                # full tasks (HellaSwag 10042, MMLU 14042 x 57)
lm_eval_batch_size: 8
lm_eval_max_seqlen: 2048
